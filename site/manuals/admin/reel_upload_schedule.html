<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="robots" content="noindex, nofollow">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>リール 投稿チェックシート｜ごちゃまぜ投稿対応</title>
  <style>
    /* ── リセット ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', Meiryo, sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      padding: 24px 16px;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      overflow: hidden;
    }

    /* ── ヘッダー ── */
    .sheet-header {
      background: linear-gradient(135deg, #2d3561 0%, #4752c4 100%);
      color: #fff;
      padding: 22px 28px 16px;
    }
    .sheet-header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 3px;
    }
    .sheet-header .sub {
      font-size: 0.82rem;
      opacity: 0.78;
    }
    .sheet-header .meta {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      font-size: 0.82rem;
      opacity: 0.9;
    }

    /* ── コントロールバー ── */
    .controls {
      padding: 14px 20px;
      background: #f0f3ff;
      border-bottom: 1px solid #d8dcf4;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .controls label {
      font-size: 0.82rem;
      color: #444;
      font-weight: 600;
      white-space: nowrap;
    }
    .controls select, .controls input[type="month"], .controls input[type="date"] {
      padding: 5px 10px;
      border: 1px solid #b0b8e8;
      border-radius: 6px;
      font-size: 0.82rem;
      background: #fff;
      color: #333;
    }
    .controls input[type="number"] {
      width: 60px;
      padding: 5px 8px;
      border: 1px solid #b0b8e8;
      border-radius: 6px;
      font-size: 0.82rem;
      text-align: center;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-primary { background: #4752c4; color: #fff; }
    .btn-primary:hover { background: #3741b0; transform: translateY(-1px); }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-outline {
      background: #fff;
      color: #4752c4;
      border: 1.5px solid #4752c4;
    }
    .btn-outline:hover { background: #eef0ff; }

    /* テンプレ凡例バッジ */
    .legend {
      padding: 8px 20px;
      border-bottom: 1px solid #e4e8f0;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      background: #fafbff;
    }
    .legend-label {
      font-size: 0.73rem;
      color: #666;
      margin-right: 4px;
      font-weight: 600;
    }
    .templ-badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 10px;
      font-size: 0.72rem;
      font-weight: 700;
      color: #fff;
    }

    /* ── テーブル ── */
    .table-wrapper { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    thead tr { background: #e8eaf6; }
    thead th {
      padding: 9px 10px;
      text-align: center;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      color: #3c3c6e;
      border-bottom: 2px solid #b0b8e8;
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid #e4e8f0;
      transition: background 0.15s;
    }
    tbody tr:hover { background: #f0f3ff; }
    tbody tr.done { background: #f0faf4; }
    tbody tr.done td { color: #999; }

    tbody td {
      padding: 8px 10px;
      text-align: center;
      vertical-align: middle;
    }
    td.no { font-weight: 700; color: #5c6bc0; width: 40px; }
    td.date { text-align: left; font-weight: 600; min-width: 110px; }
    td.file {
      text-align: left;
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
      color: #3a3a5c;
      min-width: 130px;
    }
    td.theme-cell { min-width: 90px; font-size: 0.78rem; color: #555; }
    td.check-cell { width: 80px; }

    /* テンプレバッジ（行内） */
    .row-badge {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 8px;
      font-size: 0.72rem;
      font-weight: 700;
      color: #fff;
    }

    /* チェックボックス */
    .check-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      gap: 5px;
    }
    .check-label input[type="checkbox"] {
      width: 17px;
      height: 17px;
      accent-color: #4752c4;
      cursor: pointer;
    }
    .check-label .check-text { font-size: 0.75rem; color: #666; }

    /* ── フッター ── */
    .sheet-footer {
      padding: 12px 24px;
      background: #f8f9ff;
      border-top: 1px solid #e4e8f0;
      font-size: 0.8rem;
      color: #999;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    /* ── 印刷 ── */
    @media print {
      body { background: #fff; padding: 4mm 6mm; }
      .container { box-shadow: none; border-radius: 0; max-width: 100%; }
      .sheet-header {
        background: #2d3561 !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        padding: 12px 16px 10px;
      }
      .sheet-header h1 { font-size: 1.05rem; }
      .controls, .legend { padding: 6px 12px; }
      .btn, .print-btn, .btn-danger, .btn-outline { display: none; }
      .sheet-footer { padding: 6px 16px; }
      thead tr { background: #e8eaf6 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      tbody tr.done { background: #f0faf4 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      table { font-size: 0.74rem; }
      thead th, tbody td { padding: 5px 6px; }
      .check-label .check-text { display: none; }
      .check-label input[type="checkbox"] { width: 12px; height: 12px; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- ヘッダー -->
  <div class="sheet-header">
    <h1>🎬 リール 投稿チェックシート <small style="font-size:0.72em;opacity:0.8;">ごちゃまぜ投稿対応</small></h1>
    <div class="sub">180本プールから毎日ランダムに投稿 — 前後でテンプレ・テーマが被らないよう確認しながら予約する</div>
    <div class="meta">
      <span>1日1本・毎日12:00投稿</span>
      <span id="metaProgress">完了: 0 / 0 本</span>
    </div>
  </div>

  <!-- コントロールバー -->
  <div class="controls">
    <label>開始日：
      <input type="date" id="startDate" value="2026-04-01">
    </label>
    <label>投稿本数：
      <input type="number" id="totalCount" value="30" min="1" max="180">
    </label>
    <button class="btn btn-primary" onclick="buildTable()">▶ シート生成</button>
    <button class="btn btn-outline" onclick="window.print()">🖨️ 印刷</button>
    <button class="btn btn-danger" onclick="resetChecked()">🔄 チェックリセット</button>
  </div>

  <!-- テンプレ凡例 -->
  <div class="legend" id="legendBar">
    <span class="legend-label">テンプレ凡例：</span>
    <!-- JSで生成 -->
  </div>

  <!-- テーブル -->
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>No</th>
          <th>投稿予定日</th>
          <th>時刻</th>
          <th>動画ファイル</th>
          <th>表紙ファイル</th>
          <th>テンプレ</th>
          <th>テーマ月</th>
          <th>アップ済み</th>
        </tr>
      </thead>
      <tbody id="checkTableBody">
      </tbody>
    </table>
  </div>

  <!-- フッター -->
  <div class="sheet-footer">
    <span id="progressText">シートを生成してください</span>
    <span style="font-size:0.73rem;color:#bbb;">※ テンプレ・テーマ月は手動で書き換えてOK。チェック状態はブラウザに自動保存。</span>
  </div>

</div>

<script>
// ─── 設定 ───────────────────────────────────────────────
const TIME = '12:00';
const WEEKDAY_JA = ['日','月','火','水','木','金','土'];

// テンプレA〜L（12種）の色定義
const TEMPLATES = [
  { id:'A', color:'#e53935' },
  { id:'B', color:'#e67c22' },
  { id:'C', color:'#f4c430' },
  { id:'D', color:'#43a047' },
  { id:'E', color:'#1e88e5' },
  { id:'F', color:'#5e35b1' },
  { id:'G', color:'#d81b60' },
  { id:'H', color:'#00897b' },
  { id:'I', color:'#6d4c41' },
  { id:'J', color:'#546e7a' },
  { id:'K', color:'#7cb342' },
  { id:'L', color:'#8e24aa' },
];

// 年間テーマ月（3月〜2月）
const THEME_MONTHS = [
  '3月:採用LP基礎',
  '4月:失敗パターン',
  '5月:求職者の本音',
  '6月:SNS×採用',
  '7月:LPの作り方',
  '8月:コスト削減',
  '9月:秋の準備',
  '10月:若者・女性',
  '11月:成功事例',
  '12月:来年の戦略',
  '1月:ブランディング',
  '2月:LP改善',
];

const STORE_KEY = 'reel_upload_pool_checked';
const META_KEY  = 'reel_upload_pool_meta'; // {startDate, total}

// ─── ローカルストレージ ──────────────────────────────
function loadChecked() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); }
  catch { return []; }
}
function saveChecked(arr) {
  localStorage.setItem(STORE_KEY, JSON.stringify(arr));
}
function resetChecked() {
  if (!confirm('チェック状態をすべてリセットしますか？')) return;
  localStorage.removeItem(STORE_KEY);
  buildTable();
}

// ─── 凡例バー ───────────────────────────────────────
function buildLegend() {
  const bar = document.getElementById('legendBar');
  bar.innerHTML = '<span class="legend-label">テンプレ凡例：</span>';
  TEMPLATES.forEach(t => {
    const span = document.createElement('span');
    span.className = 'templ-badge';
    span.style.background = t.color;
    span.textContent = 'テンプレ' + t.id;
    bar.appendChild(span);
  });
}

// ─── テーブル生成 ───────────────────────────────────
function buildTable() {
  const startVal = document.getElementById('startDate').value;
  const total    = parseInt(document.getElementById('totalCount').value, 10) || 30;
  const tbody    = document.getElementById('checkTableBody');
  const checked  = loadChecked();

  if (!startVal || isNaN(total) || total < 1) {
    alert('開始日と本数を正しく入力してください');
    return;
  }

  // 開始日パース（ローカルタイム）
  const [yr, mo, dy] = startVal.split('-').map(Number);
  const startDate = new Date(yr, mo - 1, dy);

  tbody.innerHTML = '';

  for (let i = 1; i <= total; i++) {
    const d = new Date(startDate);
    d.setDate(startDate.getDate() + (i - 1));
    const mm = d.getMonth() + 1;
    const dd = d.getDate();
    const w  = WEEKDAY_JA[d.getDay()];
    const dateStr = `${mm}/${dd}（${w}）`;

    const num = String(i).padStart(2, '0');
    const isDone = checked.includes(i);

    // デフォルトのテンプレ（A〜Lをローテーション）
    const tmplIdx = (i - 1) % TEMPLATES.length;
    const tmpl = TEMPLATES[tmplIdx];

    // デフォルトのテーマ月（3月〜2月をローテーション）
    const themeIdx = (i - 1) % THEME_MONTHS.length;
    const themeName = THEME_MONTHS[themeIdx];

    const tr = document.createElement('tr');
    if (isDone) tr.classList.add('done');
    tr.id = `row-${i}`;

    tr.innerHTML = `
      <td class="no">${i}</td>
      <td class="date">${dateStr}</td>
      <td class="time">${TIME}</td>
      <td class="file">reel_${num}.mp4</td>
      <td class="file">reel_${num}_cover.png</td>
      <td class="theme-cell">
        <span class="row-badge" style="background:${tmpl.color};">テンプレ${tmpl.id}</span>
      </td>
      <td class="theme-cell" style="font-size:0.76rem;">${themeName}</td>
      <td class="check-cell">
        <label class="check-label">
          <input type="checkbox" id="chk-${i}" ${isDone ? 'checked' : ''}
            onchange="toggleCheck(${i}, this.checked)">
          <span class="check-text">${isDone ? '完了' : ''}</span>
        </label>
      </td>
    `;

    tbody.appendChild(tr);
  }

  updateProgress(total);
  buildLegend();
}

function toggleCheck(num, isChecked) {
  const arr = loadChecked();
  if (isChecked) {
    if (!arr.includes(num)) arr.push(num);
  } else {
    const idx = arr.indexOf(num);
    if (idx !== -1) arr.splice(idx, 1);
  }
  saveChecked(arr);

  const tr = document.getElementById(`row-${num}`);
  const span = tr.querySelector('.check-text');
  if (isChecked) {
    tr.classList.add('done');
    span.textContent = '完了';
  } else {
    tr.classList.remove('done');
    span.textContent = '';
  }

  const total = parseInt(document.getElementById('totalCount').value, 10) || 30;
  updateProgress(total);
}

function updateProgress(total) {
  const arr = loadChecked();
  const done = arr.filter(n => n <= total).length;
  const text = `完了: ${done} / ${total} 本`;
  document.getElementById('progressText').textContent = text;
  document.getElementById('metaProgress').textContent = text;
}

// ─── 初期化 ─────────────────────────────────────────
buildTable();
buildLegend();
</script>

</body>
</html>
