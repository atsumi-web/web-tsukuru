<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <!-- クライアント用デモの線画アート（見本の構造を表現） -->
  <g fill="none" stroke="#1b3228" stroke-width="0.3" stroke-linecap="round" stroke-linejoin="round">
    <!-- 下部をうねる破線（見本の縫い目・カットラインのような線） -->
    <path d="M 0 80 Q 25 50, 45 60 T 80 85" stroke-dasharray="1 1.5" />
    
    <!-- ここから下は「イラストが入る位置」を示す抽象的なボタニカル・腕の線画（仮） -->
    <!-- 左下の葉っぱ風 -->
    <path d="M 10 95 Q 15 80, 25 75 C 30 65, 35 85, 25 75 C 15 85, 20 65, 25 75" />
    <!-- 中央の植物風 -->
    <path d="M 40 95 Q 35 75, 50 65 C 55 60, 45 50, 50 65 C 60 60, 50 75, 50 65" />
    <!-- 右側の「手・茎」に見立てた曲線 -->
    <path d="M 75 95 Q 70 65, 85 45 C 75 35, 80 25, 85 45 C 90 25, 95 35, 85 45" />
    <path d="M 85 45 Q 75 15, 80 0" />
  </g>
</svg>
