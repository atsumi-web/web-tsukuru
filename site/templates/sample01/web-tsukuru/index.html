<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webをつくるしごと | 個人事業主・中小企業のためのLP制作</title>
    <style>
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; }
        header { background: #f9f9f9; padding: 40px 20px; text-align: center; }
        h1 { margin: 0; font-size: 24px; letter-spacing: 0.1em; }
        .hero { padding: 60px 20px; text-align: center; max-width: 800px; margin: 0 auto; }
        .hero h2 { font-size: 36px; margin-bottom: 20px; }
        .works { padding: 60px 20px; background: #fff; }
        .container { max-width: 1000px; margin: 0 auto; }
        .work-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; margin-top: 40px; }
        .work-item { border: 1px solid #eee; border-radius: 8px; overflow: hidden; transition: box-shadow 0.3s; }
        .work-item:hover { box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .work-thumb { height: 200px; background: #ddd; display: flex; align-items: center; justify-content: center; color: #888; }
        .work-info { padding: 20px; }
        .work-title { font-weight: bold; font-size: 18px; margin-bottom: 10px; display: block; }
        .btn { display: inline-block; padding: 10px 30px; background: #333; color: #fff; text-decoration: none; border-radius: 4px; margin-top: 20px; }
        footer { background: #333; color: #fff; padding: 20px; text-align: center; margin-top: 60px; font-size: 12px; }
    </style>
</head>
<body>

    <header>
        <h1>Webをつくるしごと</h1>
    </header>

    <section class="hero">
        <h2>あなたの「しごと」を、<br>もっと届ける。</h2>
        <p>小規模事業者・個人事業主様専門のランディングページ制作。<br>「つたわる」構成とデザインで、ビジネスの成長をサポートします。</p>
        <a href="#contact" class="btn">ご相談・お問い合わせ</a>
    </section>

    <section class="works">
        <div class="container">
            <h3>制作実績 (Works)</h3>
            <div class="work-grid">
                <!-- 実績1: KOHAKU CAFE -->
                <div class="work-item">
                    <a href="works/kohaku-cafe/index.html" style="text-decoration: none; color: inherit;">
                        <div class="work-thumb" style="background: url('works/kohaku-cafe/images/hero-bg.jpg') center/cover;"></div>
                        <div class="work-info">
                            <span class="work-title">KOHAKU CAFE 様</span>
                            <p style="font-size: 14px; color: #666;">架空のカフェLP。静寂と光の大人の隠れ家をコンセプトに、没入感のあるデザインで構築。</p>
                        </div>
                    </a>
                </div>
                
                <!-- 今後の実績プレースホルダー -->
                <div class="work-item">
                    <div class="work-thumb">Coming Soon</div>
                    <div class="work-info">
                        <span class="work-title">美容室 様 (準備中)</span>
                        <p style="font-size: 14px; color: #666;">あなたの実績がここに追加されます。</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        &copy; 2024 Webをつくるしごと
    </footer>

</body>
</html>
