<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ (Contact) | 株式会社ドクターペダル</title>
  <meta name="description" content="株式会社ドクターペダルへのお問い合わせ、ご依頼、取材、採用に関するご質問はこちらから承っております。">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./css/style.css?v=5.0">
</head>
<body>

  <!-- ======== SHARED HEADER ======== -->
  <div id="shared-header" data-root-path="./" data-theme="theme-white"></div>

  <main>
    <!-- ======== PAGE HERO ======== -->
    <section class="page-hero" style="background: linear-gradient(rgba(17,17,17,0.4), rgba(17,17,17,0.4)), url('./images/ai_company_hero.webp') center 65% / cover;">
      <div class="container">
        <h1 class="title" style="color:var(--white);">Contact</h1>
        <p class="eyebrow" style="margin-top:16px; color:var(--white);">各種お問い合わせ</p>
      </div>
    </section>

    <!-- ======== BREADCRUMBS ======== -->
    <div style="background:var(--white); border-bottom:1px solid var(--gray-line); padding:16px 0;">
      <div class="container">
        <div style="font-size:0.8rem; font-weight:700;">
          <a href="./index.html" style="color:var(--text-muted); text-decoration:none;">TOP</a> &gt; 
          <span>お問い合わせ</span>
        </div>
      </div>
    </div>

    <!-- ======== CONTACT FORM SECTION ======== -->
    <section class="section-padding" style="background:var(--gray-bg);">
      <div class="container" style="max-width:800px;">
        
        <div class="section-layer reveal">
          <div class="layer-en">CONTACT US</div>
          <h2 class="layer-ja">各種お問い合わせ</h2>
        </div>

        <p class="reveal delay-100" style="text-align:center; color:var(--text-main); font-weight:500; margin-bottom:48px; line-height:1.8;">
          ドクターペダルに関するご質問、法人向けサービスのご依頼、<br class="hidden-sp">または取材等に関するお問い合わせは、以下のフォームよりお願いいたします。<br>
          <span style="font-size:0.9rem; color:var(--text-muted); display:block; margin-top:8px;">※採用へのエントリーもこちらから受け付けております。</span>
        </p>

        <!-- Form Box -->
        <form action="#" method="POST" class="contact-form reveal delay-200">
          
          <div class="form-group">
            <label class="form-label" for="inquiry_type">お問い合わせ種別 <span class="badge-req">必須</span></label>
            <div class="select-wrapper">
              <select id="inquiry_type" name="inquiry_type" class="form-input" required>
                <option value="" selected disabled>種別をお選びください</option>
                <option value="b2b_rental">B2Bシェアサイクルのご相談</option>
                <option value="b2b_repair">法人向け修理・メンテナンスのご依頼</option>
                <option value="recruit">採用・エントリーに関するお問い合わせ</option>
                <option value="press">取材・協業に関するお問い合わせ</option>
                <option value="other">その他</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group half">
              <label class="form-label" for="company">会社名・部署名 <span class="badge-opt">任意</span></label>
              <input type="text" id="company" name="company" class="form-input" placeholder="例：株式会社ドクターペダル">
            </div>
            <div class="form-group half">
              <label class="form-label" for="name">お名前 <span class="badge-req">必須</span></label>
              <input type="text" id="name" name="name" class="form-input" placeholder="例：早川 光" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group half">
              <label class="form-label" for="email">メールアドレス <span class="badge-req">必須</span></label>
              <input type="email" id="email" name="email" class="form-input" placeholder="例：info@dr-pedal.com" required>
            </div>
            <div class="form-group half">
              <label class="form-label" for="phone">電話番号 <span class="badge-opt">任意</span></label>
              <input type="tel" id="phone" name="phone" class="form-input" placeholder="例：03-0000-0000">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="message">お問い合わせ内容 <span class="badge-req">必須</span></label>
            <textarea id="message" name="message" class="form-textarea" placeholder="ご質問やご依頼内容、取材の趣旨などを具体的にご記入ください。" required></textarea>
          </div>

          <div class="form-privacy">
            <p>ご記入・ご送信いただいた個人情報は、ご本人の同意なく第三者に開示することはありません。<br>詳細は<a href="#" style="color:var(--gold); font-weight:700; text-decoration:underline;">プライバシーポリシー</a>をご確認ください。</p>
          </div>

          <button type="submit" class="btn-primary w-100" style="padding:24px; font-size:1.2rem; margin-top:16px;">
            規約に同意して送信する <i class="fa-solid fa-paper-plane" style="margin-left:8px;"></i>
          </button>
        </form>

      </div>
    </section>

  </main>
  
  <div id="shared-footer" data-root-path="./"></div>
  <script src="./js/shared-nav.js"></script>
</body>
</html>
