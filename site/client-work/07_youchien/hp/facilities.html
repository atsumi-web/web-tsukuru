<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>施設案内・アクセス | みどりが丘幼稚園</title>
<meta name="description" content="みどりが丘幼稚園の施設とアクセスマップをご紹介します。"/>
<meta name="robots" content="noindex,nofollow"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Shippori+Mincho:wght@400;500;600;800&family=Outfit:wght@300;400;600;700&family=Cormorant+Infant:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css?v=2.21">
<script src="js/shared-nav.js?v=2.6" data-root-path="./" defer></script>
<style>
.ky-fac-hero { height: 80vh; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; }
.ky-fac-hero-bg { position: absolute; inset: 0; z-index: 1; }
.ky-fac-hero-bg img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.9); animation: zoomIn 10s ease infinite alternate; }
@keyframes zoomIn { 0% { transform: scale(1); } 100% { transform: scale(1.05); } }
.ky-fac-hero::after { content: ''; position: absolute; inset: 0; z-index: 2; background: linear-gradient(to top, rgba(255,255,255,1) 0%, rgba(255,255,255,0.2) 60%, rgba(255,255,255,0.5) 100%); pointer-events: none; }
.ky-fac-hero-tx { position: relative; z-index: 4; text-align: center; }
.ky-fac-hero-tx .mz-head-en { font-family: 'Cormorant Infant', serif; font-size: 24px; letter-spacing: 0.2em; display: block; margin-bottom: 24px; opacity: 0; animation: fadeUp 1s .5s forwards; color: var(--td); }
.ky-fac-hero-tx .mz-head-ja { font-family: var(--serif); font-size: clamp(36px, 4vw, 56px); opacity: 0; animation: fadeUp 1s .7s forwards; color: var(--td); letter-spacing: 0.15em; }
@keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

/* MASONRY GALLERY */
.ky-gal-sec { padding: 180px 40px; background: #fff; }
.ky-gal-grid { max-width: 1200px; margin: 100px auto 0; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 400px 400px; gap: 40px; }
.ky-gal-item { overflow: hidden; border-radius: 4px; position: relative; }
.ky-gal-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 1.2s cubic-bezier(0.2,1,0.2,1); }
.ky-gal-item:hover img { transform: scale(1.05); }
.ky-gal-tall { grid-column: 1 / 2; grid-row: 1 / 3; height: 100%; }
.ky-gal-wide { grid-column: 2 / 3; grid-row: 2 / 3; height: 100%; }
.ky-gal-square { grid-column: 2 / 3; grid-row: 1 / 2; height: 100%; }
.ky-gal-cap { position: absolute; bottom: 0; left: 0; right: 0; padding: 40px 32px 32px; background: linear-gradient(to top, rgba(0,0,0,0.6), transparent); color: #fff; font-family: var(--serif); font-size: 16px; letter-spacing: 0.1em; transform: translateY(20px); opacity: 0; transition: all 0.6s ease; }
.ky-gal-item:hover .ky-gal-cap { transform: translateY(0); opacity: 1; }

/* ACCESS & MAP */
.ky-acc-sec { padding: 180px 40px; background: #fdfcfa; }
.ky-acc-container { max-width: 1000px; margin: 80px auto 0; display: flex; gap: 80px; }
.ky-acc-info { flex: 1; }
.ky-acc-map { width: 55%; height: 500px; border-radius: 4px; overflow: hidden; }
.ky-acc-map iframe { width: 100%; height: 100%; border: none; filter: grayscale(100%) contrast(1.1) opacity(0.8); transition: filter 0.6s ease; }
.ky-acc-map:hover iframe { filter: grayscale(0%) contrast(1) opacity(1); }

.ky-acc-dl { width: 100%; }
.ky-acc-dl dt { font-family: 'Outfit'; font-size: 13px; letter-spacing: 0.15em; color: var(--tl); text-transform: uppercase; margin-bottom: 8px; border-top: 1px solid rgba(0,0,0,0.06); padding-top: 24px; }
.ky-acc-dl dt:first-child { border-top: none; padding-top: 0; }
.ky-acc-dl dd { font-family: var(--serif); font-size: 16px; line-height: 2.2; letter-spacing: 0.05em; color: var(--td); margin-bottom: 32px; }

@media(max-width: 960px){
  .ky-gal-sec, .ky-acc-sec { padding: 120px 24px; }
  .ky-gal-grid { grid-template-columns: 1fr; grid-template-rows: auto auto auto; gap: 24px; margin-top: 60px; }
  .ky-gal-tall, .ky-gal-wide, .ky-gal-square { height: 350px; grid-column: auto; grid-row: auto; }
  .ky-gal-cap { opacity: 1; transform: none; padding: 40px 24px 24px; }
  
  .ky-acc-container { flex-direction: column; gap: 40px; }
  .ky-acc-map { width: 100%; height: 300px; }
}
</style>
</head>
<body>

<section class="ky-fac-hero scrolly">
  <div class="ky-fac-hero-bg"><img src="images/kindy_fac_hero.png" alt=""></div>
  <div class="ky-fac-hero-tx">
    <span class="mz-head-en" style="transform:translateY(20px)">FACILITIES</span>
    <h1 class="mz-head-ja" style="transform:translateY(20px)">施設案内・アクセス</h1>
  </div>
</section>

<!-- MASONRY GALLERY -->
<section class="ky-gal-sec">
  <div class="mz-head fu">
    <span class="mz-head-en">Spaces</span>
    <h2 class="mz-head-ja">園内のご案内</h2>
  </div>
  <div class="ky-gal-grid">
    <div class="ky-gal-item ky-gal-tall fu">
      <img src="images/kindy_fac_1.png" alt="教室">
      <div class="ky-gal-cap">光あふれる保育室</div>
    </div>
    <div class="ky-gal-item ky-gal-square fu" data-d="1">
      <img src="images/kindy_fac_hero.png" alt="外観">
      <div class="ky-gal-cap">広大な園庭とモダンな建築</div>
    </div>
    <div class="ky-gal-item ky-gal-wide fu">
      <img src="images/kindy_fac_2.png" alt="木のおもちゃ">
      <div class="ky-gal-cap">温もりのある木製玩具</div>
    </div>
  </div>
</section>

<!-- ACCESS -->
<section class="ky-acc-sec">
  <div class="mz-head fu">
    <span class="mz-head-en">Access</span>
    <h2 class="mz-head-ja">アクセス</h2>
  </div>
  <div class="ky-acc-container">
    <div class="ky-acc-info fu">
      <dl class="ky-acc-dl">
        <dt>Address</dt>
        <dd>〒000-0000<br>○○県○○市みどりが丘1-2-3</dd>
        
        <dt>Train</dt>
        <dd>○○線「みどりが丘駅」より徒歩8分<br>※駅から遊歩道が直結しています。</dd>
        
        <dt>Bus</dt>
        <dd>○○バス「みどり中央」停留所より徒歩2分</dd>
        
        <dt>Parking</dt>
        <dd>保護者様専用駐車場を30台完備。<br>行事の際も安心してご来園いただけます。</dd>
      </dl>
    </div>
    <div class="ky-acc-map fu" data-d="1">
      <!-- Dummy Map -->
      <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3240.4867909307044!2d139.7547167761501!3d35.68962057258416!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x60188c0c0b13f54d%3A0xb630953be9cb68fa!2sTokyo%20Station!5e0!3m2!1sen!2sjp!4v1700000000000!5m2!1sen!2sjp" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
  </div>
</section>

<!-- SPLIT CTA -->
<section class="mz-next-split">
  <a href="admissions.html" class="mz-ns-link fu">
    <div class="mz-ns-bg"><img src="images/kindy_adm_sticky.png" alt="入園のご案内"></div>
    <div class="mz-ns-tx">
      <span class="mz-ns-en">Admissions</span>
      <h3 class="mz-ns-ja">入園のご案内へ戻る</h3>
    </div>
  </a>
  <a href="contact.html" class="mz-ns-link fu" data-d="1">
    <div class="mz-ns-bg"><img src="images/kindy_contact_hero.png?v=2" alt="お問い合わせ"></div>
    <div class="mz-ns-tx">
      <span class="mz-ns-en">Contact</span>
      <h3 class="mz-ns-ja">お問い合わせ・見学申込</h3>
    </div>
  </a>
</section>

<script>
// Intersect Reveal
const obs = new IntersectionObserver(es => {
  es.forEach(e => { if(e.isIntersecting){ e.target.classList.add('vis'); obs.unobserve(e.target); }});
}, {threshold:.1});
document.querySelectorAll('.fu').forEach(el => obs.observe(el));
</script>
</body>
</html>
