<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ページが見つかりません | Webとしくみをつくる</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Outfit:wght@400;700;900&display=swap" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    :root {
      --accent: #4f46e5;
      --muted: #64748b;
      --bg: #f8fafc;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .wrap { max-width: 480px; }
    .num {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(5rem, 20vw, 8rem);
      font-weight: 900;
      background: linear-gradient(135deg, #4f46e5, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 16px;
    }
    h1 { font-size: 1.1rem; font-weight: 700; margin-bottom: 10px; }
    p { font-size: .85rem; color: var(--muted); line-height: 1.8; margin-bottom: 32px; }
    .links { display: none; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="num">404</div>
  <h1>ページが見つかりません</h1>
  <p>URLが間違っているか、ページが移動した可能性があります。<br>以下からご確認ください。</p>

</div>
</body>
</html>
